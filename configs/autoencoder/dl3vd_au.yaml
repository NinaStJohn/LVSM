model:
  class_name: model.autoencoder_vae.AutoencoderKL
  embed_dim: 16
  ddconfig:
    double_z: true
    z_channels: 16
    resolution: 384
    in_channels: 3
    out_ch: 3
    ch: 64
    ch_mult: [1, 2, 4]       # 3 levels -> 8x spatial downsampling
    num_res_blocks: 1
    attn_resolutions: []
    attn_type: "linear"
    dropout: 0.0
  lossconfig:
    disc_start: 50001
    kl_weight: 0.000001
    disc_weight: 0.5
    perceptual_weight: 1.0
    disc_num_layers: 3
    disc_in_channels: 3
    disc_ndf: 64
    disc_loss: "hinge"

training:
  train_steps: 200000
  grad_accum_steps: 1
  batch_size_per_gpu: 4
  num_workers: 4
  prefetch_factor: 2
  lr: 4.5e-6
  weight_decay: 0.0
  beta1: 0.5
  beta2: 0.9
  warmup: 1000
  scheduler_type: "cosine"
  grad_clip_norm: 1.0
  use_amp: true
  amp_dtype: "bf16"
  use_tf32: true
  print_every: 100
  wandb_log_every: 100
  vis_every: 1000
  checkpoint_every: 5000
  checkpoint_dir: "experiments/checkpoints/AE_dl3dv"
  wandb_project: "LVSM-AE"
  wandb_exp_name: "ae_dl3dv_kl16"
  api_key_path: "configs/api_keys/api_keys.yaml"

dataset:
  class_name: data.dl3dv_dataset.DL3DVDataset   # update if your dataset class differs